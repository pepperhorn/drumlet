      "@type": "SoftwareApplication",
      "name": "Drumlet",
      "alternateName": "Drumlet — your gateway to groove",
      "description": "Drumlet is an interactive drum machine, composition and rehearsal tool. Build patterns with real drum-machine samples (TR-808, LM-2, CR-8000), play them live for accuracy scoring, and share challenges via URL. Dottl compatible.",
      "applicationCategory": "MusicApplication",
      "applicationSubCategory": "Drum Machine",
      "operatingSystem": "Web Browser",
      "browserRequirements": "Requires JavaScript and Web Audio API",
      "url": "https://drumlet.pepperhorn.com/",
      "image": "https://drumlet.pepperhorn.com/og-image.png",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "creator": {
        "@type": "Organization",
        "name": "Pepperhorn",
        "url": "https://pepperhorn.com"
      },
      "featureList": [
        "Step sequencer with multi-page patterns",
        "Time signature changes, swing, humanize, per-step velocity",
        "Real drum machine samples (TR-808, LM-2, CR-8000 and more)",
        "Notation view powered by VexFlow",
        "Play-along practice modes with accuracy scoring",
        "Telephone rhythm-chain mode",
        "URL-encoded pattern sharing — no backend required",
        "Dottl compatible"
      ],
      "license": "https://www.gnu.org/licenses/agpl-3.0.html"

    <!-- JSON-LD: FAQ (Answer Engine Optimization) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Drumlet?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Drumlet is a browser-based interactive drum machine, composition and rehearsal tool. It combines a step sequencer with real drum-machine samples, a notation view, and play-along scoring so you can build patterns and rehearse them with accuracy feedback."
          }
        },
        {
          "@type": "Question",
          "name": "Is Drumlet free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Drumlet runs entirely in your browser at no cost and is open source under the GNU AGPL v3 license."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to install anything?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Drumlet runs in any modern browser with Web Audio support. No download or sign-up is required to start building patterns."
          }
        },
        {
          "@type": "Question",
          "name": "Is Drumlet Dottl compatible?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Drumlet is fully compatible with Dottl, so patterns and challenges interoperate across the Dottl ecosystem."
          }
        },
        {
          "@type": "Question",
          "name": "Can I share my drum patterns?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Drumlet encodes patterns and challenges directly into the URL hash fragment, so you can share a link to any groove without needing a backend or account."
          }
        }
      ]
    }
    </script>
